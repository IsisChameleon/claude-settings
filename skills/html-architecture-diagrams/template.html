<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>diagram — SVG stage template</title>
<!-- Pick a DISTINCTIVE pairing per project: characterful display + mono. Never Inter/Arial. -->
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ============ 1. THEME TOKENS — retheme the whole diagram here ============ */
  :root {
    --bg: #07090a;
    --panel: rgba(18, 24, 26, 0.72);
    --line: rgba(120, 200, 180, 0.16);
    --ink: #e9f2ec;
    --dim: #6e8079;
    --ctrl: #8ea2ff;   /* control plane  */
    --data: #ffb454;   /* data plane     */
    --alt:  #3fe0d0;   /* second data plane / return path */
    --grid: rgba(255,255,255,0.025);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 40px 24px; background: var(--bg); color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    /* faint engineering grid for atmosphere */
    background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .wrap { max-width: 1240px; margin: 0 auto; } /* keep equal to the viewBox width */
  h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; letter-spacing: -0.02em; }

  .stage-frame { border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: #0b0f11; }

  /* ============ 2. THE STAGE — one coordinate system, scales as a unit ============
     viewBox is the design canvas (here 1240x520). width:100%/height:auto makes the
     WHOLE diagram (cards, text, paths) scale responsively. No JS, no media queries. */
  svg.stage { display: block; width: 100%; height: auto; }

  /* ============ 3. NODE CARDS (inside foreignObject) ============ */
  .node {
    width: 100%; height: 100%;
    background: var(--panel); border: 1px solid var(--line); border-radius: 13px;
    padding: 11px 13px; display: flex; flex-direction: column; gap: 7px;
    opacity: 0; animation: pop 0.55s cubic-bezier(0.2,0.9,0.3,1) forwards; /* staggered via inline delay */
  }
  @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
  .node h3 { font-family: "Bricolage Grotesque"; font-size: 15px; margin: 0; } /* px = viewBox units → scales */
  .node .tag { font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .node .port { font-size: 9px; color: var(--alt); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .node .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .node .note { font-size: 9.5px; line-height: 1.5; color: var(--dim); }

  /* ============ 4. EDGES ============ */
  .edge { fill: none; stroke-linecap: round; }
  /* draw-in: set --len to ≥ path length; dash offsets to 0 on load.
     CONFLICT: .draw owns stroke-dasharray — for edges that must STAY dashed
     (control plane), use .fade instead. */
  .draw { stroke-dasharray: var(--len, 600); stroke-dashoffset: var(--len, 600); animation: draw 1.1s ease forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  .fade { opacity: 0; animation: fadein 0.9s ease 0.3s forwards; }
  @keyframes fadein { to { opacity: 1; } }

  /* edge labels sit on a bg rect so they stay legible over the grid */
  .lbl { font-family: "JetBrains Mono"; font-size: 10.5px; fill: var(--dim); }
  .lbl-bg { fill: #0b0f11; opacity: 0.82; }

  .legend { display: flex; gap: 22px; margin-top: 18px; font-size: 10.5px; color: var(--dim); flex-wrap: wrap; }
  .legend .sw { display: inline-block; width: 22px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 7px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>System name</h1>

  <div class="stage-frame">
    <!-- WORKFLOW: 1) pick canvas size  2) write down every card's (x,y,w,h) on lanes/columns
         3) derive path endpoints FROM those numbers (right edge = x+w, y+h/2; etc.)
         4) leave ≥60px gutters between columns for labels -->
    <svg class="stage" viewBox="0 0 1240 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- one marker PER COLOR: markers don't inherit stroke color -->
        <marker id="mCtrl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8ea2ff"/></marker>
        <marker id="mData" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ffb454"/></marker>
      </defs>

      <!-- ===== EDGES (under the cards) =====
           Card A: x=60  y=180 w=280 h=160  → right edge mid = (340, 260)
           Card B: x=480 y=60  w=280 h=160  → left edge mid  = (480, 140)
           Card C: x=480 y=300 w=280 h=160  → left edge mid  = (480, 380)
           Card D: x=900 y=180 w=280 h=160  → left edge mid  = (900, 260)        -->

      <!-- control edge: dashed, A → B. Uses .fade (NOT .draw — draw-in would
           override the dash pattern, see CSS comment) -->
      <path class="edge fade" stroke="var(--ctrl)" stroke-width="2"
            stroke-dasharray="2 7" d="M 340,230 C 410,230 410,145 480,140" marker-end="url(#mCtrl)"/>

      <!-- data edge: solid, A → C, with a traveling pulse -->
      <path class="edge draw" style="--len:300" stroke="var(--data)" stroke-width="2.4"
            d="M 340,290 C 410,290 410,375 480,380" marker-end="url(#mData)"/>
      <!-- the pulse duplicates the path's d verbatim — animateMotion can't reference the path -->
      <circle r="3.6" fill="#ffb454">
        <animateMotion dur="2s" repeatCount="indefinite" path="M 340,290 C 410,290 410,375 480,380"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- data edge: B → D -->
      <path class="edge draw" style="--len:300" stroke="var(--data)" stroke-width="2.4"
            d="M 760,140 C 840,145 840,235 900,250" marker-end="url(#mData)"/>

      <!-- edge label on a bg rect -->
      <g>
        <rect class="lbl-bg" x="368" y="186" width="92" height="15" rx="3"/>
        <text class="lbl" x="372" y="197" fill="var(--ctrl)">control · rpc</text>
        <rect class="lbl-bg" x="368" y="316" width="92" height="15" rx="3"/>
        <text class="lbl" x="372" y="327" fill="var(--data)">data · queue</text>
      </g>

      <!-- ===== NODES =====
           foreignObject x/y/w/h are viewBox coordinates — same space as the paths.
           The inner div MUST carry xmlns or it renders blank in some browsers. -->
      <foreignObject x="60" y="180" width="280" height="160">
        <div xmlns="http://www.w3.org/1999/xhtml" class="node" style="animation-delay:.05s">
          <div class="top"><h3>service-a</h3><span class="port">:8080</span></div>
          <div class="tag">role · entrypoint</div>
          <div class="note">What it does, and the one <b style="color:var(--ink)">non-obvious fact</b> worth knowing about it.</div>
        </div>
      </foreignObject>

      <foreignObject x="480" y="60" width="280" height="160">
        <div xmlns="http://www.w3.org/1999/xhtml" class="node" style="animation-delay:.2s">
          <div class="top"><h3>service-b</h3><span class="port">:9000</span></div>
          <div class="tag">role</div>
          <div class="note">…</div>
        </div>
      </foreignObject>

      <foreignObject x="480" y="300" width="280" height="160">
        <div xmlns="http://www.w3.org/1999/xhtml" class="node" style="animation-delay:.3s">
          <div class="top"><h3>service-c</h3><span class="port">:6379</span></div>
          <div class="tag">role</div>
          <div class="note">…</div>
        </div>
      </foreignObject>

      <foreignObject x="900" y="180" width="280" height="160">
        <div xmlns="http://www.w3.org/1999/xhtml" class="node" style="animation-delay:.4s">
          <div class="top"><h3>service-d</h3><span class="port">:5432</span></div>
          <div class="tag">role</div>
          <div class="note">…</div>
        </div>
      </foreignObject>
    </svg>
  </div>

  <div class="legend">
    <span><span class="sw" style="background:var(--ctrl)"></span>control plane</span>
    <span><span class="sw" style="background:var(--data)"></span>data flow</span>
  </div>

  <!-- For MULTIPLE diagrams: wrap each stage in a <section class="view">, add tab buttons,
       and on switch re-trigger animations:
       el.style.animation='none'; void el.offsetWidth; el.style.animation=''; -->
</div>
</body>
</html>
